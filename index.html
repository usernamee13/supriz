<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çiçek</title>

<style>
body {
  margin:0;
  background:#000;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  height:100vh;
}

/* BASİTLEŞTİRİLMİŞ ÇALIŞAN VERSİYON */

.flower {
  position:relative;
  width:200px;
  height:200px;
  animation:bloom 3s ease forwards;
}

.petal {
  position:absolute;
  width:80px;
  height:120px;
  background:pink;
  border-radius:50%;
  top:40px;
  left:60px;
  transform-origin:bottom center;
}

.p1 { transform:rotate(0deg) scale(0); animation:open 2s 1s forwards; }
.p2 { transform:rotate(60deg) scale(0); animation:open 2s 1.2s forwards; }
.p3 { transform:rotate(120deg) scale(0); animation:open 2s 1.4s forwards; }
.p4 { transform:rotate(180deg) scale(0); animation:open 2s 1.6s forwards; }
.p5 { transform:rotate(240deg) scale(0); animation:open 2s 1.8s forwards; }
.p6 { transform:rotate(300deg) scale(0); animation:open 2s 2s forwards; }

.center {
  position:absolute;
  width:60px;
  height:60px;
  background:yellow;
  border-radius:50%;
  top:80px;
  left:70px;
  transform:scale(0);
  animation:open 1s 2.5s forwards;
}

.stem {
  position:absolute;
  width:10px;
  height:200px;
  background:green;
  left:95px;
  top:150px;
  transform:scaleY(0);
  transform-origin:top;
  animation:grow 2s forwards;
}

@keyframes open {
  to { transform:scale(1) rotate(var(--r,0deg)); }
}

@keyframes grow {
  to { transform:scaleY(1); }
}

@keyframes bloom {
  from { transform:scale(0.5); }
  to { transform:scale(1); }
}
</style>
</head>

<body>

<div class="flower">
<div class="stem"></div>
<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>
<div class="petal p5"></div>
<div class="petal p6"></div>
<div class="center"></div>
</div>

</body>
</html>
